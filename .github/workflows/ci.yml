name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: vitest
        run: npm test

      - name: cdk synth (slug A)
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: us-east-1
        run: npx cdk synth -c app=ci-a --quiet

      - name: cdk synth (slug B, verifies disjoint stacks)
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: us-east-1
        run: npx cdk synth -c app=ci-b --quiet
